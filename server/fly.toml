app = "xiaoli-server"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  TZ = "Asia/Shanghai"
  PUBLIC_BASE_URL = "https://xiaoli-server.fly.dev"
  ASR_MODULE = "SiliconFlowASR"
  LLM_MODULE = "SiliconFlowLLM"
  VLLM_MODULE = "SiliconFlowVLLM"
  TTS_MODULE = "SiliconFlowTTS"
  DEVICE_NAME = "小李"
  OPENROUTER_LLM_MODEL = "openrouter/free"
  OPENROUTER_VLLM_MODEL = "openrouter/free"
  SILICONFLOW_LLM_MODEL = "Qwen/Qwen3-8B"
  SILICONFLOW_VLLM_MODEL = "Qwen/Qwen3-VL-8B-Instruct"
  SILICONFLOW_ASR_MODEL = "FunAudioLLM/SenseVoiceSmall"
  SILICONFLOW_TTS_MODEL = "FunAudioLLM/CosyVoice2-0.5B"
  SILICONFLOW_TTS_VOICE = "FunAudioLLM/CosyVoice2-0.5B:anna"
  SILICONFLOW_TTS_RESPONSE_FORMAT = "wav"
  XIAOLI_GO_TTS_RESPONSE_FORMAT = "opus"
  ENABLE_SERVER_AUTH = "true"
  ALLOWED_DEVICE_IDS = "28:84:85:8c:ef:f4"
  XIAOLI_ADMIN_ENABLED = "true"
  XIAOLI_ADMIN_PORT = "8080"
  XIAOLI_DIRECT_DEVICE_SERVER = "true"
  LOGTO_ENDPOINT = "https://fpilyb.logto.app/"
  LOGTO_APP_ID = "6blgsvdv3quybqsm38xkc"
  STUDY_MONITOR_TIMEZONE = "Asia/Shanghai"
  STUDY_MONITOR_START_HOUR = "17"
  STUDY_MONITOR_END_HOUR = "21"
  STUDY_MONITOR_INTERVAL_SECONDS = "300"
  STUDY_MONITOR_CAMERA_TOOL = "self.camera.take_photo"
  STUDY_MONITOR_TOOL_TIMEOUT_SECONDS = "120"
  STUDY_MONITOR_REMINDER_TEXT = "请坐直，认真学习。"
  LANGSMITH_PROJECT = "xiaoli-server"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
